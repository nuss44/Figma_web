        /* Reset e Estilos Gerais baseados no container principal */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #F3F4F6;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        /* Página Portal de Serviços (Novo Cores) - iPhone 17 */
        .page-container {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 0px;
            isolation: isolate;
            position: relative;
            width: 402px;
            background: #FFFFFF;
            overflow-x: hidden;
            box-shadow: 0px 4px 24px rgba(0, 0, 0, 0.1);
        }

        /* Header - TopAppBar */
        .top-app-bar {
            box-sizing: border-box;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            padding: 0px 16px;
            width: 402px;
            height: 64px;
            background: #FFFFFF;
            border-bottom: 1px solid #E5E7EB;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header-left {
            display: flex;
            flex-direction: row;
            align-items: center;
            padding: 0px;
            gap: 16px;
            width: 110.14px;
            height: 32px;
        }

        .back-button {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 8px;
            width: 32px;
            height: 32px;
            border-radius: 9999px;
            border: none;
            background: transparent;
            cursor: pointer;
            color: #005A9C;
        }

        .header-title {
            width: 62.14px;
            height: 28px;
            font-style: normal;
            font-weight: 700;
            font-size: 20px;
            line-height: 28px;
            display: flex;
            align-items: center;
            color: #005A9C;
        }

        .header-right {
            display: flex;
            flex-direction: row;
            align-items: center;
            padding: 0px;
            gap: 8px;
            width: 32px;
            height: 36px;
        }

        .notification-button {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 8px;
            width: 32px;
            height: 36px;
            border-radius: 9999px;
            border: none;
            background: transparent;
            cursor: pointer;
            color: #9CA3AF;
        }

        /* Main Content */
        main {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 32px 16px 128px;
            gap: 48px;
            width: 402px;

        }

        /* Hero Search Section */
        .hero-search-section {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 0px;
            gap: 24px;
            width: 370px;
            height: 104px;
            align-self: stretch;
        }

        .hero-title {
            width: 370px;

            font-style: normal;
            font-weight: 400;
            font-size: 16px;
            line-height: 24px;
            display: flex;
            align-items: center;
            color: #1F2937;
            align-self: stretch;
        }

        .search-container {

            align-items: flex-start;
            padding: 0px;
            isolation: isolate;
            width: 370px;
            max-width: 672px;

            position: relative;
            align-self: stretch;
        }

            display: flex;

            align-items: flex-start;

            height: 56px;
            background: #FFFFFF;
            border: 1px solid #E2E2E5;
            border-radius: 8px;
            align-self: stretch;
            font-size: 16px;
            color: #1F2937;
            outline: none;
        }

        .search-input::placeholder {
            color: #9CA3AF;
        }

        .search-icon-wrapper {

            flex-direction: column;
            align-items: flex-start;
            padding: 0px;
            position: absolute;
            width: 18px;
            height: 18px;
            left: 16px;
            top: 19px;
            color: #9CA3AF;
            z-index: 1;
        }
